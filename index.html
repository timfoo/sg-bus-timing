<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SG Bus Timing</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px;
      }

      h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
        margin-bottom: 20px;
        color: #fff;
      }

      .search-row {
        display: flex;
        gap: 8px;
        width: 100%;
        max-width: 360px;
        margin-bottom: 24px;
      }

      input[type="text"] {
        flex: 1;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        color: #fff;
        font-size: 15px;
        padding: 10px 14px;
        outline: none;
      }

      input[type="text"]::placeholder {
        color: #555;
      }

      input[type="text"]:focus {
        border-color: #fff;
      }

      button {
        background: #fff;
        color: #000;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 16px;
        cursor: pointer;
      }

      #back-btn {
        background: #222;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 16px;
        cursor: pointer;
        margin-bottom: 16px;
        display: none;
      }

      button:active {
        opacity: 0.8;
      }

      #stop-name {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
        text-align: center;
      }

      #results {
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .bus-card {
        background: #111;
        border: 1px solid #222;
        border-radius: 10px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .bus-number {
        font-size: 22px;
        font-weight: 700;
        min-width: 52px;
        color: #fff;
      }

      .arrivals {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .arrival-chip {
        background: #1e1e1e;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 14px;
        font-weight: 500;
        color: #fff;
      }

      .arrival-chip.arriving {
        color: #4ade80;
      }

      .arrival-chip.soon {
        color: #facc15;
      }

      #status {
        font-size: 13px;
        color: #555;
        margin-top: 8px;
        text-align: center;
      }

      #error {
        font-size: 13px;
        color: #f87171;
        margin-top: 8px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Bus Arrival</h1>

    <button id="back-btn" style="display:none">← Back</button>

    <div id="stop-name"></div>
    <div id="results"></div>
    <div id="status"></div>
    <div id="error"></div>

    <script type="module" src="/Main.ts"></script>
  </body>
</html>
